# Self-bench: u64 hash mixing function comparison.
# Validates the full mockspace bench harness pipeline (orchestrator,
# worker subprocess, dlopen, CSV cache, findings.md) against a real
# consumer codebase: mockspace itself.

[bench.hash-mix]
title = "u64 hash-mix function comparison"
workload = "default"
master_seed = 0x1234_5678_9ABC_DEF0

# Variant entries hold the cargo target stem (no `lib` prefix, no
# `.dylib`/`.so`/`.dll` suffix). The bench bin shapes each path with
# DLL_PREFIX + DLL_SUFFIX at startup so this manifest is portable
# across host platforms. v3 may hoist that into the harness so each
# consumer does not redo the dance.
[[bench.hash-mix.sizes]]
n = 1
variants = [
    "../target/release/multiply_xor",
    "../target/release/bitwise_rotate",
]

[timing]
passes = 4
runs_per_pass = 1000
batch_size = 100
harness_runs = 1
cooldowns_ms = [0]
